name: DevSecOps CI/CD to Cloud Run

on:
  push:
    branches:
      - dev
      - test
      - main

env:
  PROJECT_ID: your-gcp-project-id # TODO: Update this
  REGION: us-central1
  GAR_LOCATION: us-central1-docker.pkg.dev
  REPOSITORY: snake-game-repo
  IMAGE_NAME: snake-game

jobs:
  devsecops_scans:
    name: DevSecOps - Security & Linting Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Security Tools
        run: pip install -r requirements-dev.txt

      - name: SAST - Bandit Python Scan
        run: bandit -r snake.py -f txt

      - name: Dependency Check - Safety
        run: safety check -r requirements.txt || echo "Allowing pipeline to continue for info-only vulnerabilities"

      - name: Static Analysis - Flake8
        run: flake8 snake.py || echo "Flake8 found non-critical formatting issues."

      - name: Secret Scan - TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  build_and_deploy:
    name: Build Docker and Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: devsecops_scans
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set dynamic variables based on current branch
      - name: Set Environment Variables
        id: env_vars
        run: |
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "SERVICE_NAME=snake-game-dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "test" ]]; then
            echo "SERVICE_NAME=snake-game-test" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "SERVICE_NAME=snake-game-prod" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}' # e.g., "projects/123/locations/global/workloadIdentityPools/github/providers/my-repo"
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}' # e.g., "my-service-account@my-project.iam.gserviceaccount.com"

      - name: Configure Docker to use GAR
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker Image to Identity Registry
        run: |
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ steps.env_vars.outputs.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Define environment-specific configurations
          flags: |
            --allow-unauthenticated
            --port=8080
