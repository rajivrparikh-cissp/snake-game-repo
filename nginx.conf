server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Important for Pygbag: Ensure WebAssembly and JavaScript have correct MIME types
    location / {
        try_files $uri $uri/ =404;
    }

    # Add correct headers for WASM / SharedArrayBuffer if needed
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000";
    }
}
